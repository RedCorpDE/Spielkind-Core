services:
  - type: web
    name: spielkind-core
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_EMBEDDED_SCHEDULER
        value: true
      - key: SCHEDULER_TIMEZONE
        value: Europe/Berlin
      - key: REGIONDO_WEBHOOK_CRON
        value: "*/1 * * * *"
      - key: WEBHOOK_BOOKINGS_PATH
        value: /webhooks/regiondo/bookings
      - key: REGIONDO_CATALOG_SYNC_CRON
        value: 0 3 * * 1
      - key: REMINDER_DISPATCH_CRON
        value: "*/5 * * * *"
      - key: DATABASE_URL
        fromDatabase:
          name: spielkind-db
          property: connectionString
      - key: CRON_SECRET
        sync: false
      - key: REGIONDO_BASE_URL
        sync: false
      - key: REGIONDO_PUBLIC_KEY
        sync: false
      - key: REGIONDO_SECRET_KEY
        sync: false
      - key: REGIONDO_PRODUCT_SUPPLIER_ID
        sync: false
      - key: WEBHOOK_AUTH_HEADER_NAME
        sync: false
      - key: WEBHOOK_AUTH_HEADER_VALUE
        sync: false
      - key: REGIONDO_WEBHOOK_SECRET
        sync: false
      - key: REMINDER_PROVIDER_WEBHOOK_URL
        sync: false
      - key: REMINDER_PROVIDER_SECRET
        sync: false
      - key: ADMIN_ACCESS_TOKEN_SECRET
        sync: false
      - key: DASHBOARD_ALLOWED_ORIGIN
        sync: false

  # Render cron jobs (use when ENABLE_EMBEDDED_SCHEDULER=false):
  # - type: cron
  #   name: spielkind-core-regiondo-webhooks
  #   env: node
  #   schedule: "*/5 * * * *"
  #   buildCommand: npm ci && npm run build
  #   startCommand: node dist/scripts/job-regiondo-webhooks.js
  # - type: cron
  #   name: spielkind-core-regiondo-catalog
  #   env: node
  #   schedule: "0 3 * * 1"
  #   buildCommand: npm ci && npm run build
  #   startCommand: node dist/scripts/job-sync-regiondo-catalog.js
  # - type: cron
  #   name: spielkind-core-reminders
  #   env: node
  #   schedule: "*/5 * * * *"
  #   buildCommand: npm ci && npm run build
  #   startCommand: node dist/scripts/job-dispatch-reminders.js

databases:
  - name: spielkind-db
    plan: starter
    postgresMajorVersion: 16

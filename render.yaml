services:
  - type: web
    name: spielkind-regiondo-sync
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRODUCT_SYNC_CRON
        value: 0 3 * * *
      - key: DATABASE_URL
        fromDatabase:
          name: spielkind-db
          property: connectionString

databases:
  - name: spielkind-db
    plan: starter
    postgresMajorVersion: 16
